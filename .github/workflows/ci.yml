name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Unit tests
        run: pytest -q

      - name: Reproduce pipeline (prepare -> train -> gate -> drift)
        # `dvc repro` runs each stage; the evaluate stage exits non-zero on a sub-threshold
        # model, which fails the build — the model quality gate.
        run: dvc repro --force

      - name: Show metrics + drift
        run: |
          echo "=== metrics ===" && cat artifacts/metrics.json
          echo "=== drift ==="   && cat reports/drift.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-and-reports
          path: |
            artifacts/
            reports/
